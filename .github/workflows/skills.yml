name: skills

on:
  pull_request:
  push:
    paths:
      - "skills/**"
      - ".github/workflows/skills.yml"

permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SKILL frontmatter and install script mode
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          skill_files = sorted(pathlib.Path('.').glob('skills/*/SKILL.md'))
          if not skill_files:
              sys.exit('No skill files found under skills/*/SKILL.md')

          errors = []
          for skill_file in skill_files:
              text = skill_file.read_text(encoding='utf-8')
              match = re.match(r'^---\n(.*?)\n---\n', text, flags=re.DOTALL)
              if not match:
                  errors.append(f'{skill_file}: missing valid YAML frontmatter block')
                  continue

              fields = {}
              for raw_line in match.group(1).splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if ':' not in line:
                      errors.append(f'{skill_file}: invalid frontmatter line: {raw_line}')
                      continue
                  key, value = line.split(':', 1)
                  fields[key.strip()] = value.strip()

              for required_key in ('name', 'description'):
                  if not fields.get(required_key):
                      errors.append(f'{skill_file}: frontmatter missing required key `{required_key}`')

              install_script = skill_file.parent / 'install.sh'
              if not install_script.exists():
                  errors.append(f'{install_script}: missing install script')
              elif install_script.stat().st_mode & 0o111 == 0:
                  errors.append(f'{install_script}: install script must be executable')

          if errors:
              print('Skill validation failed:')
              for err in errors:
                  print(f'- {err}')
              sys.exit(1)

          print(f'Validated {len(skill_files)} skill(s).')
          PY

      - name: Run each skill installer in temp directory
        run: |
          set -euo pipefail
          for install_script in skills/*/install.sh; do
            echo "Running ${install_script}"
            TARGET_SKILLS_DIR="${RUNNER_TEMP}/installed-skills" "./${install_script}"
          done
